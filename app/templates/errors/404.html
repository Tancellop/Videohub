{% extends "base.html" %}
{% block title %}404 — Страница не найдена{% endblock %}
{% block content %}
<div class="empty-state" style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
    <div style="font-family:var(--font-display);font-size:120px;color:var(--accent);opacity:0.3;line-height:1;">404</div>
    <div class="empty-title">Страница не найдена</div>
    <div class="empty-subtitle" style="margin-top:8px;">Возможно, она была удалена или вы перешли по неверной ссылке</div>
    <a href="{{ url_for('main.index') }}" class="btn-primary" style="margin-top:24px;">На главную</a>
</div>
{% endblock %}

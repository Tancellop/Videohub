{% extends "base.html" %}
{% block title %}Категории{% endblock %}
{% block content %}
<h1 class="section-title" style="margin-bottom:32px;">Все <span style="color:var(--accent)">Категории</span></h1>
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;">
{% for cat in categories %}
<a href="{{ url_for('main.index', category=cat.slug) }}" style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:32px 20px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);text-align:center;transition:all 0.2s;">
<span style="font-size:48px;">{{ cat.icon }}</span>
<div style="font-weight:700;font-size:16px;">{{ cat.name }}</div>
<div style="font-size:12px;color:var(--text-2);">{{ cat.video_count() }} видео</div>
</a>
{% endfor %}
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Забыли пароль{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo"><div class="auth-logo-text">▶ VideoHub</div></div>
        <h2 class="auth-title">Сброс пароля</h2>
        <p class="auth-subtitle">Введите email — мы отправим ссылку для восстановления</p>
        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label">Email</label>
                <div class="form-input-icon">
                    <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <input type="email" class="form-input" name="email" placeholder="your@email.com" required>
                </div>
            </div>
            <button type="submit" class="auth-btn">Отправить ссылку</button>
        </form>
        <div class="auth-footer"><a href="{{ url_for('auth.login') }}">← Вернуться к входу</a></div>
    </div>
</div>
{% endblock %}

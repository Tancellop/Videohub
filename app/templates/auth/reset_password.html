{% extends "base.html" %}
{% block title %}Новый пароль{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo"><div class="auth-logo-text">▶ VideoHub</div></div>
        <h2 class="auth-title">Новый пароль</h2>
        <p class="auth-subtitle">Введите новый пароль для вашего аккаунта</p>
        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label">Новый пароль</label>
                <input type="password" class="form-input" name="password" placeholder="Минимум 8 символов" required minlength="8">
            </div>
            <div class="form-group">
                <label class="form-label">Подтвердите пароль</label>
                <input type="password" class="form-input" name="confirm_password" placeholder="Повторите пароль" required>
            </div>
            <button type="submit" class="auth-btn">Сохранить пароль</button>
        </form>
    </div>
</div>
{% endblock %}
